# %YAML 1.2
# root: path/to/flutter
# arcĥ: build arch
# version: engine version
define:
  prefix: '"data/data/com.termux/files/usr"'
  distro: '"data/data/com.termux/files/usr/opt/flutter"'
  remote: f'https://storage.googleapis.com/flutter_infra_release/flutter/{version}'

control:
  Package: flutter
  Version: $tag
  Architecture: $architecture
  Maintainer: mumumusuc <mumumusuc@gmail.com>
  Pre-Depends: x11-repo
  Depends: git, which, gtk3, xorgproto, ninja, cmake, clang, pkg-config, openjdk-21
  Homepage: https://www.github.com/flutter/flutter
  Description: Flutter makes it easy and fast to build beautiful apps for mobile and beyond

resource:
  flutter:
    source: $root
    output: $distro
    git: true

  flutter_gpu:
    source: $root/engine/src/flutter/lib/gpu
    output: $distro/bin/cache/pkg/flutter_gpu
    test:
      file: $remote/flutter_gpu.zip
      path: $distro/bin/cache/pkg

  sky_engine:
    source: $any/gen/dart-pkg/sky_engine
    output: $distro/bin/cache/pkg/sky_engine
    define:
      any: &any output.any
    test:
      file: $remote/sky_engine.zip
      path: $distro/bin/cache/pkg

  dart_sdk:
    source: $any/dart-sdk
    output: $out/dart-sdk
    define:
      any: *any
      out: &cache f'{distro}/bin/cache'
    test:
      file: $remote/dart-sdk-linux-$arch.zip
      path: $distro/bin/cache

  # dart binary for running flutter commands
  # Use debug mode dart as it has compatible snapshot flags
  dart_bin:
    source: $debug/dart
    output: $out/dart-sdk/bin/dart
    define:
      debug: output.debug
      out: *cache
    mode: 0o755

  # dart snapshots required for flutter commands
  dart_snapshots:
    source: $debug/dart-sdk/bin/snapshots
    output: $out/dart-sdk/bin/snapshots
    define:
      debug: output.debug
      out: *cache

  # dartaotruntime is required for flutter build apk/linux
  dartaotruntime:
    source: $any/dartaotruntime_product
    output: $out/dart-sdk/bin/dartaotruntime
    define:
      any: *any
      out: *cache
    mode: 0o755

  # frontend_server_aot snapshot for AOT compilation
  # Use product mode snapshot to work with dartaotruntime_product
  frontend_server_aot:
    source: $any/frontend_server_aot_product.dart.snapshot
    output: $out/dart-sdk/bin/snapshots/frontend_server_aot.dart.snapshot
    define:
      any: *any
      out: *cache
    mode: 0o644

  artifacts:
    source:
      - $root/engine/src/flutter/impeller/compiler/shader_lib
      - $any/flutter_tester
      - $any/font-subset
      - $any/icudtl.dat
      - $any/impellerc
      - $any/gen_snapshot
      - $any/libpath_ops.so
      - $any/libtessellator.so
      - $any/const_finder.dart.snapshot
    output:
      - $eng/linux-$arch
    define:
      any: *any
      eng: &eng f'{distro}/bin/cache/artifacts/engine'
    test:
      file: $remote/linux-$arch/artifacts.zip
      path: $eng

  flutter_linux_gtk: &gtk
    source:
      - $out/flutter_linux
      - $out/gen_snapshot
      - $out/libflutter_linux_gtk.so
    output:
      - $eng/linux-$arch$fix
    define:
      eng: *eng
      out: output.debug
      fix: '""'
    test:
      file: $remote/linux-$arch-debug/linux-$arch-flutter-gtk.zip
      path: $eng

  flutter_linux_gtk_release:
    <<: *gtk
    define:
      eng: *eng
      out: output.release
      fix: '"-release"'
    test:
      file: $remote/linux-$arch-release/linux-$arch-flutter-gtk.zip
      path: $eng

  flutter_linux_gtk_profile:
    <<: *gtk
    define:
      eng: *eng
      out: output.profile
      fix: '"-profile"'
    test:
      file: $remote/linux-$arch-profile/linux-$arch-flutter-gtk.zip
      path: $eng

  flutter_patched_sdk: &sdk
    source:
      - $out/flutter_patched_sdk/platform_strong.dill
      - $out/flutter_patched_sdk/vm_outline_strong.dill
    output:
      - $eng/common/flutter_patched_sdk$fix
    define:
      eng: *eng
      out: *any
      fix: '""'
    test:
      file: $remote/flutter_patched_sdk.zip
      path: &com $eng/common

  flutter_patched_sdk_product:
    <<: *sdk
    define:
      eng: *eng
      out: output.release
      fix: '"_product"'
    test:
      file: $remote/flutter_patched_sdk_product.zip
      path: *com

  executable:
    source: |-
      #!/$prefix/bin/sh
      exec /$distro/bin/flutter "$@"
    output:
      - $prefix/bin/flutter
    binary: true
    mode: 0o755

  profile:
    source: export PATH=${PREFIX}/opt/flutter/bin:${PATH}
    output: $prefix/etc/profile.d/flutter.sh
    binary: true
    mode: 0o755

  stamps:
    source: $version
    output:
      - $out/engine-dart-sdk.stamp
      - $out/flutter_sdk.stamp
      - $out/font-subset.stamp
      - $out/linux-sdk.stamp
    binary: true
    define:
      out: *cache
    mode: 0o644

  # Android gen_snapshot for building APKs on Termux
  # This gen_snapshot runs on ARM64 Termux and produces Android ARM64 AOT code
  #
  # Technical limitation (tested 2025-12-28):
  # Only android-arm64 is supported. android-arm and android-x64 fail because:
  # - android-arm: BoringSSL has 32-bit shift overflow errors
  # - android-x64: ARM64 sysroot incompatible with x64 compilation
  # The Flutter GN build system doesn't properly separate host/target toolchains.
  # Users must use --target-platform android-arm64 when building APKs.
  android_gen_snapshot_arm64:
    source:
      - $android_out/clang_arm64/gen_snapshot
    output:
      - $eng/android-arm64-release/linux-$arch
    define:
      eng: *eng
      android_out: f'{root}/engine/src/out/android_release_arm64'
    mode: 0o755
