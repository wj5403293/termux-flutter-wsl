name: 測試 Android gen_snapshot

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 目標架構
        required: true
        default: arm64
        type: choice
        options:
          - arm64
      mode:
        description: 構建模式
        required: true
        default: release
        type: choice
        options:
          - release
          - profile
      jobs:
        description: Ninja 並行數
        required: true
        default: "4"

permissions:
  contents: read

concurrency:
  group: test-android-gen-snapshot-${{ github.ref }}-${{ inputs.arch }}-${{ inputs.mode }}
  cancel-in-progress: false

jobs:
  android-gen-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: 顯示測試流程
        run: |
          echo "========== Android gen_snapshot 專項測試 =========="
          echo "1. 下載倉庫原始碼"
          echo "2. 清理磁碟空間"
          echo "3. 安裝系統依賴與 Android NDK r27d"
          echo "4. 配置 depot_tools 與 Python 依賴"
          echo "5. Clone Flutter 並同步 Engine 依賴"
          echo "6. 套用補丁並組裝 sysroot"
          echo "7. 執行 configure_android"
          echo "8. 執行 build_android_gen_snapshot"
          echo "9. 上傳日誌與 gen_snapshot 產物"
          echo "================================================="

      - name: 下載原始碼
        uses: actions/checkout@v4

      - name: 清理磁碟空間
        run: |
          echo "[步驟 1/8] 清理 GitHub Runner 預設佔用空間..."
          df -h
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker system prune -af || true
          df -h
          echo "[步驟 1/8] 磁碟清理完成"

      - name: 安裝系統依賴
        run: |
          echo "[步驟 2/8] 安裝系統依賴..."
          sudo apt update
          sudo apt install -y curl git python3 python3-pip ninja-build pkg-config unzip xz-utils libfreetype-dev
          echo "[步驟 2/8] 系統依賴安裝完成"

      - name: 安裝 Android NDK r27d
        run: |
          echo "[步驟 3/8] 檢查並安裝 Android NDK r27d..."
          NDK_DIR=/opt/android-ndk-r27d
          if [ ! -d "$NDK_DIR" ]; then
            curl -L --retry 3 https://dl.google.com/android/repository/android-ndk-r27d-linux.zip -o /tmp/android-ndk-r27d-linux.zip
            sudo unzip -q /tmp/android-ndk-r27d-linux.zip -d /opt
          fi
          test -d "$NDK_DIR"
          echo "[步驟 3/8] Android NDK 已就緒: $NDK_DIR"

      - name: 配置 depot_tools
        uses: newkdev/setup-depot-tools@v1.0.1

      - name: 安裝 Python 依賴
        run: |
          echo "[步驟 4/8] 安裝 Python 依賴..."
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          echo "[步驟 4/8] Python 依賴安裝完成"

      - name: 提供 vpython3 備援
        run: |
          echo "[步驟 4/8] 檢查 vpython3..."
          if ! command -v vpython3 >/dev/null 2>&1; then
            printf '%s\n' '#!/usr/bin/env bash' 'exec python3 "$@"' | sudo tee /usr/local/bin/vpython3 >/dev/null
            sudo chmod +x /usr/local/bin/vpython3
          fi
          echo "[步驟 4/8] vpython3 已可用"

      - name: 驗證工具鏈
        run: |
          echo "[步驟 4/8] 驗證 gclient / ninja / vpython3 / NDK..."
          command -v gclient
          command -v ninja
          command -v vpython3
          test -f .gclient
          test -d /opt/android-ndk-r27d
          echo "[步驟 4/8] 工具鏈驗證完成"

      - name: Clone Flutter
        run: |
          echo "[步驟 5/8] Clone Flutter SDK..."
          python3 build.py clone
          echo "[步驟 5/8] Flutter SDK 準備完成"

      - name: 同步依賴
        run: |
          echo "[步驟 5/8] 開始 gclient sync，同步 Flutter Engine 依賴..."
          python3 build.py sync
          echo "[步驟 5/8] Engine 依賴同步完成"

      - name: 套用補丁
        run: |
          echo "[步驟 6/8] 套用版本補丁..."
          python3 build.py patch_engine
          python3 build.py patch_dart
          python3 build.py patch_skia
          python3 build.py patch_flutter_sdk
          echo "[步驟 6/8] 補丁套用完成"

      - name: 組裝 sysroot
        run: |
          echo "[步驟 6/8] 組裝 Termux sysroot..."
          python3 build.py sysroot --arch=${{ inputs.arch }}
          echo "[步驟 6/8] sysroot 組裝完成"

      - name: 配置 Android gen_snapshot
        run: |
          mkdir -p logs
          echo "[步驟 7/8] 執行 configure_android..."
          set -o pipefail
          python3 build.py configure_android --arch=${{ inputs.arch }} --mode=${{ inputs.mode }} 2>&1 | tee logs/01-configure_android.log
          echo "[步驟 7/8] configure_android 完成"

      - name: 構建 Android gen_snapshot
        run: |
          mkdir -p logs
          echo "[步驟 8/8] 執行 build_android_gen_snapshot..."
          set -o pipefail
          python3 build.py build_android_gen_snapshot --arch=${{ inputs.arch }} --mode=${{ inputs.mode }} --jobs=${{ inputs.jobs }} 2>&1 | tee logs/02-build_android_gen_snapshot.log
          echo "[步驟 8/8] build_android_gen_snapshot 完成"

      - name: 解析產物資訊
        id: meta
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("build.toml", "rb") as f:
              cfg = tomllib.load(f)

          tag = cfg["flutter"]["tag"]
          arch = "${{ inputs.arch }}"
          mode = "${{ inputs.mode }}"
          out_dir = f"flutter/engine/src/out/android_{mode}_{arch}"
          artifact = f"android-gen-snapshot-{tag}-{arch}-{mode}"
          print(f"tag={tag}")
          print(f"out_dir={out_dir}")
          print(f"artifact={artifact}")
          PY

      - name: 上傳 gen_snapshot 產物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact }}
          path: |
            ${{ steps.meta.outputs.out_dir }}/args.gn
            ${{ steps.meta.outputs.out_dir }}/build.ninja
            ${{ steps.meta.outputs.out_dir }}/clang_arm64/gen_snapshot
            ${{ steps.meta.outputs.out_dir }}/exe.stripped/gen_snapshot
            ${{ steps.meta.outputs.out_dir }}/gen_snapshot
          if-no-files-found: ignore
          retention-days: 14

      - name: 上傳構建日誌
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-gen-snapshot-logs-${{ inputs.arch }}-${{ inputs.mode }}
          path: logs/*.log
          if-no-files-found: ignore
          retention-days: 14
