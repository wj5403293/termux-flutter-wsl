# Flutter Termux Build Workflow
#
# NOTE: This workflow requires a self-hosted runner due to:
# - 30GB+ disk space for engine dependencies
# - 4+ hours build time
# - NDK r27d installation
#
# The workflow_dispatch trigger allows manual execution when a self-hosted
# runner is available.

name: Build Flutter for Termux

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version to build'
        required: true
        default: '3.35.0'
      arch:
        description: 'Target architecture'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64

jobs:
  build:
    # Requires self-hosted runner with:
    # - 50GB+ disk space
    # - NDK r27d at /opt/android-ndk-r27d
    # - depot_tools in PATH
    runs-on: self-hosted
    timeout-minutes: 360  # 6 hours

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Clone Flutter
        run: python3 build.py clone

      - name: Sync dependencies
        run: python3 build.py sync

      - name: Apply patches
        run: |
          python3 build.py patch_engine
          python3 build.py patch_dart
          python3 build.py patch_skia
          python3 build.py patch_flutter_sdk

      - name: Build sysroot
        run: python3 build.py sysroot --arch=${{ inputs.arch }}

      - name: Configure and build
        run: python3 build.py build_all --arch=${{ inputs.arch }}

      - name: Package deb
        run: python3 build.py debuild --arch=${{ inputs.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-termux-${{ inputs.flutter_version }}-${{ inputs.arch }}
          path: '*.deb'
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: '**/*.deb'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
